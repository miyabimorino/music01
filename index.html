
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Piano Roll Sequencer</title>
<style>
body { background:#111; color:#0f0; font-family:monospace; }
.controls { margin-bottom:10px; }
.grid { display:inline-block; margin-right:20px; }
.row { display:flex; }
.cell {
  width:16px;
  height:12px;
  border:1px solid #555;
  cursor:pointer;
}
.cell.active { background:#0f0; }
.cell.noise-active { background:#0f0; }
.label { font-size:10px; width:40px; text-align:right; padding-right:4px; }
</style>
</head>
<body>

<h3>3ch Piano Roll Sequencer</h3>

<div class="controls">
BPM: <input type="number" id="bpm" value="120" min="40" max="300">
<button onclick="togglePlay()">Play</button>
<button onclick="stop()">Stop</button>
</div>

<div id="sequencer"></div>

<script>
const steps = 16;
const octaves = 3;
const notes = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const startOctave = 3;
const totalNotes = octaves * 12;

let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let isPlaying = false;
let currentStep = 0;
let intervalId;

function noteFreq(noteIndex){
    let octave = startOctave + Math.floor(noteIndex/12);
    let note = noteIndex % 12;
    let A4 = 440;
    let semitone = (octave-4)*12 + note - 9;
    return A4 * Math.pow(2, semitone/12);
}

let data = [
    Array.from({length:steps}, ()=>null),
    Array.from({length:steps}, ()=>null),
    Array.from({length:steps}, ()=>false)
];

function buildGrid(){
    const container = document.getElementById("sequencer");
    container.innerHTML = "";

    for(let ch=0; ch<3; ch++){
        const grid = document.createElement("div");
        grid.className = "grid";

        if(ch<2){
            for(let n=totalNotes-1; n>=0; n--){
                const row = document.createElement("div");
                row.className = "row";

                if(n%12===0){
                    const label = document.createElement("div");
                    label.className = "label";
                    label.textContent = notes[n%12] + (startOctave + Math.floor(n/12));
                    row.appendChild(label);
                } else {
                    const label = document.createElement("div");
                    label.className = "label";
                    row.appendChild(label);
                }

                for(let s=0; s<steps; s++){
                    const cell = document.createElement("div");
                    cell.className = "cell";
                    cell.onclick = ()=>{
                        data[ch][s] = n;
                        refresh();
                    };
                    cell.dataset.ch = ch;
                    cell.dataset.step = s;
                    cell.dataset.note = n;
                    row.appendChild(cell);
                }

                grid.appendChild(row);
            }
        } else {
            const row = document.createElement("div");
            row.className = "row";
            const label = document.createElement("div");
            label.className = "label";
            label.textContent = "NOISE";
            row.appendChild(label);
            for(let s=0; s<steps; s++){
                const cell = document.createElement("div");
                cell.className = "cell";
                cell.onclick = ()=>{
                    data[ch][s] = !data[ch][s];
                    refresh();
                };
                cell.dataset.ch = ch;
                cell.dataset.step = s;
                row.appendChild(cell);
            }
            grid.appendChild(row);
        }

        container.appendChild(grid);
    }
}

function refresh(){
    document.querySelectorAll(".cell").forEach(c=>{
        c.classList.remove("active");
        c.classList.remove("noise-active");
    });

    for(let ch=0; ch<3; ch++){
        for(let s=0; s<steps; s++){
            if(ch<2 && data[ch][s]!==null){
                let selector = `.cell[data-ch='${ch}'][data-step='${s}'][data-note='${data[ch][s]}']`;
                let cell = document.querySelector(selector);
                if(cell) cell.classList.add("active");
            }
            if(ch===2 && data[ch][s]){
                let selector = `.cell[data-ch='2'][data-step='${s}']`;
                let cell = document.querySelector(selector);
                if(cell) cell.classList.add("noise-active");
            }
        }
    }
}

function playStep(){
    let bpm = parseInt(document.getElementById("bpm").value);
    let interval = (60/bpm)/4;

    for(let ch=0; ch<2; ch++){
        let noteIndex = data[ch][currentStep];
        if(noteIndex!==null){
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type="square";
            osc.frequency.value = noteFreq(noteIndex);
            gain.gain.value = 0.1;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + interval);
        }
    }

    if(data[2][currentStep]){
        let bufferSize = audioCtx.sampleRate * interval;
        let buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        let output = buffer.getChannelData(0);
        for(let i=0;i<bufferSize;i++){
            output[i]=Math.random()*2-1;
        }
        let noise = audioCtx.createBufferSource();
        noise.buffer = buffer;
        let gain = audioCtx.createGain();
        gain.gain.value = 0.1;
        noise.connect(gain);
        gain.connect(audioCtx.destination);
        noise.start();
    }

    currentStep = (currentStep+1)%steps;
}

function togglePlay(){
    if(isPlaying){ stop(); return; }
    isPlaying=true;
    let bpm = parseInt(document.getElementById("bpm").value);
    let interval = (60/bpm)/4*1000;
    intervalId = setInterval(playStep, interval);
}

function stop(){
    isPlaying=false;
    clearInterval(intervalId);
    currentStep=0;
}

buildGrid();
refresh();
</script>

</body>
</html>

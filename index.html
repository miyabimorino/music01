<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>8bit Game BGM Sequencer</title>
<style>
body{background:#0b0b0b;color:#00ff88;font-family:monospace;margin:20px}
h2{margin-top:0;color:#00ffaa}

.controls button{
background:#111;color:#00ff88;border:1px solid #00aa66;
padding:6px 10px;margin-right:6px;cursor:pointer
}
.controls button:hover{background:#003322}
.controls{margin-bottom:12px}

#sequencer{display:flex;gap:40px}
.channel{display:flex;flex-direction:column}
.channel-title{text-align:center;color:#00ffaa;margin-bottom:4px}

.step-header{display:flex;margin-left:50px}
.step-num{width:18px;text-align:center;font-size:10px;color:#00aa66}

.row{display:flex}

.label{
width:50px;font-size:9px;text-align:right;
padding-right:6px;color:#007744
}

.cell{
width:18px;height:10px;border:1px solid #1a1a1a;cursor:pointer
}

.cell:hover{background:#002b22}

/* active colors */
.white-note.active{background:#00ff88}
.black-note.active{background:#009944}
.noise-note.active{background:#00ffaa}

/* base backgrounds */
.black-bg{background:#111}

.cell.playing{outline:1px solid #ffffff}

.octave-line{border-top:1px solid #00aa55}
.step-sep{border-right:2px solid #003322}
</style>
</head>

<body>

<h2>8bit Game BGM Sequencer</h2>

<div class="controls">
BPM <input type="number" id="bpm" value="120" min="40" max="300">
<button onclick="togglePlay()">Play</button>
<button onclick="stop()">Stop</button>
<button onclick="toggleLoop()" id="loopBtn">Loop OFF</button>
<button onclick="resetSong()">Reset</button>
<button onclick="saveJSON()">Save JSON</button>
<input type="file" id="loadFile" style="display:none">
<button onclick="document.getElementById('loadFile').click()">Load JSON</button>
</div>

<div id="sequencer"></div>

<script>

const steps=16
const octaves=3
const notes=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"]
const startOct=3
const totalNotes=octaves*12

let audioCtx=new(window.AudioContext||window.webkitAudioContext)()

let data=[
 Array(steps).fill(null),
 Array(steps).fill(null),
 Array(steps).fill(false)
]

let currentStep=0
let loop=false
let playing=false
let timer

function freq(i){
 let octave=startOct+Math.floor(i/12)
 let note=i%12
 let A4=440
 let semitone=(octave-4)*12+note-9
 return A4*Math.pow(2,semitone/12)
}

function build(){

const root=document.getElementById("sequencer")
root.innerHTML=""

for(let ch=0;ch<3;ch++){

let wrap=document.createElement("div")
wrap.className="channel"

let title=document.createElement("div")
title.className="channel-title"
title.innerText=ch<2?"CH"+(ch+1):"NOISE"
wrap.appendChild(title)

let header=document.createElement("div")
header.className="step-header"

let spacer=document.createElement("div")
spacer.style.width="50px"
header.appendChild(spacer)

for(let s=0;s<steps;s++){
let n=document.createElement("div")
n.className="step-num"
n.innerText=s+1
header.appendChild(n)
}

wrap.appendChild(header)

if(ch<2){

for(let n=totalNotes-1;n>=0;n--){

let row=document.createElement("div")
row.className="row"
if(n%12===0)row.classList.add("octave-line")

let lab=document.createElement("div")
lab.className="label"
if(n%12===0)lab.innerText=notes[n%12]+(startOct+Math.floor(n/12))
row.appendChild(lab)

for(let s=0;s<steps;s++){

let c=document.createElement("div")
c.className="cell"

let name=notes[n%12]

if(name.includes("#")){
c.classList.add("black-bg")
c.classList.add("black-note")
}else{
c.classList.add("white-note")
}

if((s+1)%4===0)c.classList.add("step-sep")

c.dataset.ch=ch
c.dataset.step=s
c.dataset.note=n

c.onclick=()=>{

if(data[ch][s]===n){
data[ch][s]=null
}else{
data[ch][s]=n
}

draw()

}

row.appendChild(c)

}

wrap.appendChild(row)

}

}else{

let row=document.createElement("div")
row.className="row"

let lab=document.createElement("div")
lab.className="label"
lab.innerText="NOISE"
row.appendChild(lab)

for(let s=0;s<steps;s++){

let c=document.createElement("div")
c.className="cell noise-note"

if((s+1)%4===0)c.classList.add("step-sep")

c.dataset.ch=2
c.dataset.step=s

c.onclick=()=>{
data[2][s]=!data[2][s]
draw()
}

row.appendChild(c)

}

wrap.appendChild(row)

}

root.appendChild(wrap)

}

}

function draw(){

document.querySelectorAll(".cell").forEach(c=>{
c.classList.remove("active","playing")
})

for(let ch=0;ch<3;ch++){

for(let s=0;s<steps;s++){

if(ch<2){

let n=data[ch][s]

if(n!==null){
let sel=document.querySelector(`.cell[data-ch='${ch}'][data-step='${s}'][data-note='${n}']`)
if(sel)sel.classList.add("active")
}

}else{

if(data[2][s]){
let sel=document.querySelector(`.cell[data-ch='2'][data-step='${s}']`)
if(sel)sel.classList.add("active")
}

}

}

}

document.querySelectorAll(`.cell[data-step='${currentStep}']`).forEach(c=>{
c.classList.add("playing")
})

}

function playStep(){

let bpm=parseInt(document.getElementById("bpm").value)
let len=(60/bpm)/4

draw()

for(let ch=0;ch<2;ch++){

let n=data[ch][currentStep]

if(n!==null){

let o=audioCtx.createOscillator()
let g=audioCtx.createGain()

o.type="square"
o.frequency.value=freq(n)

g.gain.value=0.12

o.connect(g)
g.connect(audioCtx.destination)

o.start()
o.stop(audioCtx.currentTime+len)

}

}

if(data[2][currentStep]){

let size=audioCtx.sampleRate*len
let buf=audioCtx.createBuffer(1,size,audioCtx.sampleRate)
let out=buf.getChannelData(0)

for(let i=0;i<size;i++)out[i]=Math.random()*2-1

let src=audioCtx.createBufferSource()
src.buffer=buf

let g=audioCtx.createGain()
g.gain.value=0.12

src.connect(g)
g.connect(audioCtx.destination)

src.start()

}

currentStep++

if(currentStep>=steps){
if(loop){currentStep=0}else{stop()}
}

}

function togglePlay(){

if(playing){
stop()
return
}

playing=true
currentStep=0

let bpm=parseInt(document.getElementById("bpm").value)
let ms=(60/bpm)/4*1000

timer=setInterval(playStep,ms)

}

function stop(){
playing=false
clearInterval(timer)
currentStep=0
draw()
}

function toggleLoop(){
loop=!loop
document.getElementById("loopBtn").innerText="Loop "+(loop?"ON":"OFF")
}

function resetSong(){

data=[
Array(steps).fill(null),
Array(steps).fill(null),
Array(steps).fill(false)
]

draw()

}

function saveJSON(){

let obj={
bpm:parseInt(document.getElementById("bpm").value),
channels:data
}

let blob=new Blob([JSON.stringify(obj,null,2)],{type:"application/json"})
let url=URL.createObjectURL(blob)

let a=document.createElement("a")
a.href=url
a.download="8bit_song.json"
a.click()

}

document.getElementById("loadFile").addEventListener("change",e=>{

let file=e.target.files[0]
if(!file)return

let r=new FileReader()

r.onload=ev=>{

let obj=JSON.parse(ev.target.result)

if(obj.bpm)document.getElementById("bpm").value=obj.bpm
if(obj.channels)data=obj.channels

draw()

}

r.readAsText(file)

})

build()
draw()

</script>

</body>
</html>
